<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finda</title>
    <link rel="icon" href="images/goombaLogo.png" type="image/png">
    <link rel="stylesheet" href="StyleSheet.css">
</head>

<body>

    <nav class="toprow">
        <div class="container">
            <div class="row-header">
                <div id="logo">
                    <a href="index.html">
                        <img src="images/goombaLogo.PNG"
                             alt="logo" />
                    </a>
                </div>

                <nav class="navbar menu">
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="yourFridge.html">Your Fridge</a></li>
                        <li><a href="recipes.html">Recipes</a></li>
                        <li><a href="about.html">About Us</a></li>
                        <li><a href="savedRecipes.html">Bookmarked Recipes</a></li>
                    </ul>
                </nav>

                <a href="#" class="btn" id="userSection">Sign In</a>

            </div>
        </div>
    </nav>

    <div class="recipe-info">
        <h2 id="recipeName">Placeholder text...</h2>

        <div class="recipe-top">
            <img src="images/recipeImages/chicken_curry.jpg" alt="Recipe image" id="recipeImage">

            <div class="recipe-meta">
                <p id="prepTime">🕗 Prep time: 15 mins</p>
                <p id="cookTime">🕗 Cook time: 25 mins</p>
                <p id="servings">🍴  Servings: 2</p>
                <h2>Ingredient List:</h2>
                <div id="ingredientList">
                    <p >Example ingredient</p>
                </div>
            </div>
        </div>

        <div class="recipe-text">
            <p id="desc">Description text</p>
            <p id="instructions">Instructions text</p>
        </div>



    <script src="recipe.js"></script>
</body>
</html>
