    <form id="register" class="registerBox">
        <label for="username">Username</label>
        <input type="text" name="username" id="userName" placeholder="exampleName"><br>
        <label for="email">Email</label>
        <input type="text" name="email" id="emailAddress" placeholder="exampleName@email.com"><br>
        <label for="password">Password</label>
        <input type="text" name="password" id="userPassword" placeholder="********"><br>
        <label for="passwordConfirm">Please confirm Password</label>
        <input type="text" name="passwordConfirm" id="userPasswordConfirm" placeholder="********"><br>
        <button type="submit" id="submit">Register</button>
    </form>
